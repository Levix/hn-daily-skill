name: Refresh Pages Data

on:
  workflow_dispatch:
  schedule:
    # 每天 09:10 Asia/Shanghai ~= 01:10 UTC
    - cron: '10 1 * * *'

permissions:
  contents: write

jobs:
  refresh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Pages data from output/*-complete.md
        run: npm run build:pages

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add docs/data docs/index.html docs/app.js docs/styles.css
            git commit -m "chore: refresh pages data"
            git push
          else
            echo "No changes to commit"
          fi
